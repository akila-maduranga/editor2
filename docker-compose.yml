services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - outputs:/app/outputs
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  outputs:
